<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ermak TTS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #0e1a2b 0%, #1a2f44 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
            padding: 1.5rem;
        }

        .card {
            max-width: 820px;
            width: 100%;
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 2.2rem 2.5rem 2.8rem;
            box-shadow: 0 25px 50px -8px rgba(0, 0, 0, 0.8), inset 0 1px 2px rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: all 0.2s ease;
        }

        h1 {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 500;
            font-size: 2.4rem;
            letter-spacing: 0.5px;
            color: #ecf9ff;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.6);
            margin-bottom: 0.4rem;
        }

        h1 small {
            font-size: 1rem;
            font-weight: 400;
            opacity: 0.7;
            margin-left: 0.5rem;
            color: #b6d6f0;
        }

        .sub {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #94b8d9;
            margin-bottom: 2rem;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.08);
            padding-bottom: 0.9rem;
            font-size: 0.95rem;
        }

        .badge {
            background: #2f4b6b;
            padding: 0.3rem 1rem;
            border-radius: 50px;
            color: #d3e9ff;
            font-size: 0.8rem;
            letter-spacing: 0.3px;
            border: 1px solid #4a6d92;
            backdrop-filter: blur(4px);
        }

        .textarea-wrapper {
            position: relative;
            margin-bottom: 1.8rem;
        }

        textarea {
            width: 100%;
            padding: 1.2rem 1.5rem;
            background: rgba(10, 20, 32, 0.7);
            backdrop-filter: blur(4px);
            border: 1px solid #36526e;
            border-radius: 32px;
            font-size: 1.1rem;
            line-height: 1.6;
            color: #f0f9ff;
            resize: vertical;
            min-height: 150px;
            font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
            transition: 0.25s ease;
            box-shadow: inset 0 6px 12px rgba(0, 0, 0, 0.5);
        }

        textarea:focus {
            outline: none;
            border-color: #6a9fd8;
            background: rgba(12, 28, 46, 0.8);
            box-shadow: 0 0 0 4px rgba(74, 144, 226, 0.2), inset 0 6px 12px rgba(0, 0, 0, 0.6);
        }

        textarea::placeholder {
            color: #7f9fc0;
            font-weight: 300;
            letter-spacing: 0.3px;
        }

        .action-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            margin-top: 0.5rem;
        }

        .btn {
            background: #2e5070;
            border: none;
            padding: 0.9rem 2.4rem;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: 600;
            color: #ecf9ff;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: 0.2s ease;
            box-shadow: 0 10px 18px -6px rgba(0, 0, 0, 0.6);
            border: 1px solid #4f78a0;
            flex: 1 1 auto;
        }

        .btn-primary {
            background: #3a7bb3;
            border-color: #6aa4dd;
            box-shadow: 0 10px 20px -8px #1a3b57;
        }

        .btn-primary:hover {
            background: #4a8fcb;
            transform: scale(1.02);
            border-color: #8bbae8;
            box-shadow: 0 14px 24px -8px #1f4463;
        }

        .btn-primary:active {
            transform: scale(0.97);
        }

        .btn:disabled {
            opacity: 0.5;
            pointer-events: none;
            filter: grayscale(0.6);
        }

        .btn-icon {
            background: transparent;
            border: 1px solid #3d5f7e;
            padding: 0.9rem 1.8rem;
            flex: 0 1 auto;
        }

        .btn-icon:hover {
            background: #2a4560;
        }

        .status-area {
            margin: 1.8rem 0 0.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
            font-size: 0.9rem;
            color: #b2d0ea;
            background: rgba(0, 0, 0, 0.25);
            padding: 0.8rem 1.5rem;
            border-radius: 60px;
            backdrop-filter: blur(4px);
            border: 1px solid #2b4764;
            min-height: 3.8rem;
        }

        .status-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #5c7f9e;
            margin-right: 6px;
            transition: 0.2s;
        }

        .status-dot.active {
            background: #5fcb7a;
            box-shadow: 0 0 12px #44b564;
        }

        .status-dot.error {
            background: #d97a7a;
            box-shadow: 0 0 12px #b55353;
        }

        #statusMessage {
            flex: 1;
        }

        audio {
            width: 100%;
            margin-top: 1.5rem;
            border-radius: 60px;
            background: #0f1e2e;
            height: 44px;
            display: none;
        }

        audio:not([src=""]) {
            display: block;
        }

        .footer-note {
            margin-top: 1.8rem;
            font-size: 0.75rem;
            text-align: right;
            color: #5f80a0;
            letter-spacing: 0.3px;
            border-top: 1px solid #28415a;
            padding-top: 1rem;
        }

        .footer-note span {
            background: #1e3349;
            padding: 0.2rem 1rem;
            border-radius: 30px;
        }

        @media (max-width: 550px) {
            .card {
                padding: 1.5rem;
            }
            h1 {
                font-size: 1.8rem;
            }
            .action-row {
                flex-direction: column;
                align-items: stretch;
            }
            .btn {
                justify-content: center;
                padding: 0.8rem 1rem;
            }
        }
    </style>
</head>
<body>

    <div class="card">
        <header>
            <h1>
                🎙️ Ermak TTS
                <small>v1.2</small>
            </h1>
            <div class="sub">
                <span>🔊 <span style="font-weight:300;">TTS.ai</span> · озвучивание</span>
                <span class="badge">⚡ API key active</span>
            </div>
        </header>

        <div class="textarea-wrapper">
            <textarea id="ttsText" placeholder="Введите текст для озвучивания... (до 1000 символов)" maxlength="1000"></textarea>
        </div>

        <div class="action-row">
            <button class="btn btn-primary" id="speakBtn">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.5 8.5a4 4 0 0 1 0 7"/><path d="M19 6a8 8 0 0 1 0 12"/></svg>
                Озвучить
            </button>
            <button class="btn btn-icon" id="stopBtn" title="Остановить воспроизведение">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12"/></svg>
                Стоп
            </button>
            <button class="btn btn-icon" id="clearBtn" title="Очистить текст">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
            </button>
        </div>

        <div class="status-area" id="statusArea">
            <span class="status-dot" id="statusDot"></span>
            <span id="statusMessage">Готов к озвучиванию</span>
            <span style="margin-left: auto; opacity:0.5; font-size:0.8rem;" id="charCounter">0 / 1000</span>
        </div>

        <audio id="audioPlayer" controls preload="none" style="width:100%;"></audio>

        <div class="footer-note">
            <span>🔑 ключ: sk-tts-ca1d...4316</span>
        </div>
    </div>

    <script>
        (function() {
            const API_KEY = 'sk-tts-ca1dae4fccc84ff28ad391229af64316';
            // Правильный эндпоинт согласно документации TTS.ai (со слешем в конце)
            const TTS_API_URL = 'https://api.tts.ai/v1/tts/';

            const textarea = document.getElementById('ttsText');
            const speakBtn = document.getElementById('speakBtn');
            const stopBtn = document.getElementById('stopBtn');
            const clearBtn = document.getElementById('clearBtn');
            const audioPlayer = document.getElementById('audioPlayer');
            const statusMessage = document.getElementById('statusMessage');
            const statusDot = document.getElementById('statusDot');
            const charCounter = document.getElementById('charCounter');

            let isProcessing = false;
            let currentAudioUrl = null;
            let currentJobUuid = null; // Для отслеживания задания

            function setStatus(text, type = 'idle') {
                statusMessage.textContent = text;
                statusDot.className = 'status-dot';
                if (type === 'active') {
                    statusDot.classList.add('active');
                } else if (type === 'error') {
                    statusDot.classList.add('error');
                }
            }

            function updateCharCounter() {
                const len = textarea.value.length;
                charCounter.textContent = `${len} / 1000`;
                if (len > 950) {
                    charCounter.style.color = '#f5b87a';
                } else {
                    charCounter.style.color = '';
                }
            }

            function stopAudio() {
                if (!audioPlayer.paused) {
                    audioPlayer.pause();
                }
                if (currentAudioUrl) {
                    URL.revokeObjectURL(currentAudioUrl);
                    currentAudioUrl = null;
                }
                audioPlayer.src = '';
                audioPlayer.style.display = 'none';
                setStatus('Воспроизведение остановлено', 'idle');
            }

            // Функция для опроса статуса задания
            async function pollJobStatus(uuid) {
                const pollInterval = 1500; // 1.5 секунды
                const maxAttempts = 60; // Максимум 90 секунд
                let attempts = 0;

                return new Promise((resolve, reject) => {
                    const poll = async () => {
                        try {
                            attempts++;
                            if (attempts > maxAttempts) {
                                reject(new Error('Превышено время ожидания обработки'));
                                return;
                            }

                            const response = await fetch(`https://api.tts.ai/v1/speech/results/?uuid=${uuid}`, {
                                headers: {
                                    'Authorization': `Bearer ${API_KEY}`
                                }
                            });

                            if (!response.ok) {
                                throw new Error(`Ошибка при опросе статуса: ${response.status}`);
                            }

                            const data = await response.json();

                            if (data.status === 'completed') {
                                // Задание завершено, получаем URL результата
                                if (data.result_url) {
                                    resolve(data.result_url);
                                } else {
                                    reject(new Error('URL результата не найден'));
                                }
                                return;
                            } else if (data.status === 'failed') {
                                reject(new Error(data.error || 'Генерация не удалась'));
                                return;
                            } else if (data.status === 'queued' || data.status === 'processing') {
                                // Продолжаем опрос
                                setStatus(`⏳ Обработка аудио... (${attempts * pollInterval/1000}с)`, 'active');
                                setTimeout(poll, pollInterval);
                            } else {
                                reject(new Error(`Неизвестный статус: ${data.status}`));
                            }
                        } catch (error) {
                            reject(error);
                        }
                    };

                    poll();
                });
            }

            async function speakText() {
                const text = textarea.value.trim();
                if (!text) {
                    setStatus('❌ Введите текст для озвучивания', 'error');
                    return;
                }

                if (text.length > 1000) {
                    setStatus('❌ Превышен лимит 1000 символов', 'error');
                    return;
                }

                // Останавливаем текущее воспроизведение
                if (!audioPlayer.paused) {
                    audioPlayer.pause();
                }
                if (currentAudioUrl) {
                    URL.revokeObjectURL(currentAudioUrl);
                    currentAudioUrl = null;
                }
                audioPlayer.src = '';
                audioPlayer.style.display = 'none';

                speakBtn.disabled = true;
                isProcessing = true;
                setStatus('⏳ Отправка запроса в TTS.ai ...', 'active');

                try {
                    // 1. Отправляем запрос на синтез
                    const payload = {
                        model: 'kokoro', // Используем модель Kokoro (standard)
                        text: text,
                        voice: 'af_bella', // Женский голос на английском
                        format: 'mp3'
                        // Для русского языка можно попробовать другие голоса из /v1/voices/
                        // Например: 'ru-RU-Denis' или 'ru-RU-Elena'
                    };

                    const response = await fetch(TTS_API_URL, {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${API_KEY}`,
                            'Content-Type': 'application/json',
                            'Accept': 'application/json'
                        },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) {
                        let errorDetail = `Ошибка ${response.status}`;
                        try {
                            const errJson = await response.json();
                            if (errJson && errJson.error) {
                                if (typeof errJson.error === 'object') {
                                    errorDetail += `: ${errJson.error.message || JSON.stringify(errJson.error)}`;
                                } else {
                                    errorDetail += `: ${errJson.error}`;
                                }
                            }
                        } catch (_) {
                            errorDetail += ` — ${response.statusText}`;
                        }
                        throw new Error(errorDetail);
                    }

                    // 2. Получаем UUID задания из ответа
                    const data = await response.json();
                    const uuid = data.uuid || data.job_id;
                    if (!uuid) {
                        throw new Error('Не удалось получить UUID задания');
                    }
                    currentJobUuid = uuid;

                    // 3. Опрашиваем статус задания
                    setStatus(`⏳ Обработка аудио...`, 'active');
                    const resultUrl = await pollJobStatus(uuid);

                    // 4. Скачиваем аудио по полученному URL
                    setStatus(`⏳ Загрузка аудио...`, 'active');
                    const audioResponse = await fetch(resultUrl, {
                        headers: {
                            'Authorization': `Bearer ${API_KEY}`
                        }
                    });

                    if (!audioResponse.ok) {
                        throw new Error(`Ошибка загрузки аудио: ${audioResponse.status}`);
                    }

                    const blob = await audioResponse.blob();
                    const audioUrl = URL.createObjectURL(blob);
                    currentAudioUrl = audioUrl;

                    audioPlayer.src = audioUrl;
                    audioPlayer.style.display = 'block';
                    audioPlayer.load();

                    audioPlayer.oncanplaythrough = () => {
                        audioPlayer.oncanplaythrough = null;
                        audioPlayer.play()
                            .then(() => {
                                setStatus('▶️ Воспроизведение ...', 'active');
                                speakBtn.disabled = false;
                                isProcessing = false;
                            })
                            .catch((playError) => {
                                console.warn('Автовоспроизведение заблокировано:', playError);
                                setStatus('⚠️ Нажмите "Play" для воспроизведения', 'idle');
                                speakBtn.disabled = false;
                                isProcessing = false;
                            });
                    };

                    setTimeout(() => {
                        if (audioPlayer.readyState >= 3) {
                            if (audioPlayer.paused && audioPlayer.src) {
                                audioPlayer.play()
                                    .then(() => {
                                        setStatus('▶️ Воспроизведение ...', 'active');
                                    })
                                    .catch(() => {});
                            }
                        }
                        speakBtn.disabled = false;
                        isProcessing = false;
                    }, 3000);

                    audioPlayer.onended = () => {
                        setStatus('✅ Озвучивание завершено', 'idle');
                        if (currentAudioUrl) {
                            URL.revokeObjectURL(currentAudioUrl);
                            currentAudioUrl = null;
                        }
                    };

                    audioPlayer.onerror = (e) => {
                        console.error('Ошибка плеера:', e);
                        setStatus('❌ Ошибка воспроизведения', 'error');
                        speakBtn.disabled = false;
                        isProcessing = false;
                    };

                } catch (error) {
                    console.error('TTS Error:', error);
                    setStatus(`❌ ${error.message}`, 'error');
                    speakBtn.disabled = false;
                    isProcessing = false;
                    audioPlayer.src = '';
                    audioPlayer.style.display = 'none';
                    if (currentAudioUrl) {
                        URL.revokeObjectURL(currentAudioUrl);
                        currentAudioUrl = null;
                    }
                }
            }

            speakBtn.addEventListener('click', () => {
                if (isProcessing) return;
                speakText();
            });

            stopBtn.addEventListener('click', () => {
                stopAudio();
                setStatus('⏹️ Остановлено', 'idle');
                speakBtn.disabled = false;
                isProcessing = false;
            });

            clearBtn.addEventListener('click', () => {
                textarea.value = '';
                updateCharCounter();
                if (!audioPlayer.paused) audioPlayer.pause();
                if (currentAudioUrl) {
                    URL.revokeObjectURL(currentAudioUrl);
                    currentAudioUrl = null;
                }
                audioPlayer.src = '';
                audioPlayer.style.display = 'none';
                setStatus('Текст очищен', 'idle');
                speakBtn.disabled = false;
                isProcessing = false;
            });

            textarea.addEventListener('input', updateCharCounter);

            textarea.addEventListener('keydown', (e) => {
                if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                    e.preventDefault();
                    if (!isProcessing) {
                        speakText();
                    }
                }
            });

            updateCharCounter();

            audioPlayer.addEventListener('play', () => {
                setStatus('▶️ Воспроизведение ...', 'active');
            });

            audioPlayer.addEventListener('pause', () => {
                if (audioPlayer.currentTime > 0 && !audioPlayer.ended) {
                    setStatus('⏸️ Приостановлено', 'idle');
                }
            });

            audioPlayer.addEventListener('ended', () => {
                setStatus('✅ Озвучивание завершено', 'idle');
                if (currentAudioUrl) {
                    URL.revokeObjectURL(currentAudioUrl);
                    currentAudioUrl = null;
                }
            });

            window.addEventListener('beforeunload', () => {
                if (currentAudioUrl) {
                    URL.revokeObjectURL(currentAudioUrl);
                }
            });

            console.log('Ermak TTS инициализирован. API Key:', API_KEY.slice(0, 12) + '...');
            console.log('Используемый эндпоинт:', TTS_API_URL);
            console.log('Документация API: https://api.tts.ai');
        })();
    </script>
</body>
</html>
