<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>eChat — P2P</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 10px;
        }
        .glass {
            background: rgba(20,20,20,0.7);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 32px;
            padding: 18px 16px;
            max-width: 480px;
            width: 100%;
            max-height: 98vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 60px rgba(0,0,0,0.9);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            flex-shrink: 0;
        }
        .header h1 { color: #fff; font-size: 22px; font-weight: 800; letter-spacing: 0.5px; }
        .header h1 span { color: #60a5fa; }
        .status { display: flex; align-items: center; gap: 6px; font-size: 11px; color: rgba(255,255,255,0.3); }
        .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
        .dot.green { background: #4ade80; }
        .dot.yellow { background: #fbbf24; animation: pulse 1.5s infinite; }
        .dot.red { background: #f87171; }
        .dot.gray { background: rgba(255,255,255,0.12); }
        @keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }

        .info-box {
            background: rgba(255,255,255,0.02);
            border-radius: 14px;
            padding: 10px 14px;
            margin: 6px 0;
            border: 1px solid rgba(255,255,255,0.04);
            flex-shrink: 0;
        }
        .info-box .label { color: rgba(255,255,255,0.25); font-size: 9px; text-transform: uppercase; letter-spacing: 1px; }
        .info-box .value {
            color: #60a5fa;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            font-weight: 600;
            word-break: break-all;
            margin-top: 2px;
        }
        .info-box .value.paired { color: #4ade80; }

        .btn {
            padding: 10px 16px;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            background: rgba(255,255,255,0.04);
            text-align: center;
        }
        .btn:active { transform: scale(0.96); background: rgba(255,255,255,0.08); }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
        .btn.primary { background: rgba(96,165,250,0.12); border-color: rgba(96,165,250,0.15); }
        .btn.success { background: rgba(74,222,128,0.1); border-color: rgba(74,222,128,0.12); }
        .btn.danger { background: rgba(248,113,113,0.1); border-color: rgba(248,113,113,0.12); }
        .btn.warning { background: rgba(251,191,36,0.1); border-color: rgba(251,191,36,0.12); }

        .btn-row { display: flex; gap: 6px; flex-wrap: wrap; margin: 4px 0; flex-shrink: 0; }
        .btn-row .btn { flex: 1; min-width: 60px; padding: 8px 10px; font-size: 12px; }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 6px 2px;
            margin: 4px 0 6px 0;
            min-height: 200px;
            max-height: 400px;
            background: rgba(255,255,255,0.01);
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.02);
            display: flex;
            flex-direction: column;
        }
        .messages::-webkit-scrollbar { width: 3px; }
        .messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 10px; }

        .msg {
            padding: 8px 14px;
            margin: 2px 8px;
            border-radius: 14px;
            max-width: 85%;
            word-wrap: break-word;
            font-size: 13px;
            line-height: 1.3;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
        .msg.sent { background: rgba(96,165,250,0.12); color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
        .msg.received { background: rgba(255,255,255,0.05); color: #fff; align-self: flex-start; border-bottom-left-radius: 4px; }
        .msg .meta { display: flex; justify-content: space-between; gap: 12px; margin-top: 3px; font-size: 8px; color: rgba(255,255,255,0.2); }
        .empty { color: rgba(255,255,255,0.06); text-align: center; padding: 30px 20px; font-size: 12px; align-self: center; margin: auto; }

        .input-area {
            display: flex;
            gap: 6px;
            padding: 6px 0 2px 0;
            flex-shrink: 0;
            border-top: 1px solid rgba(255,255,255,0.04);
        }
        .input-area input {
            flex: 1;
            padding: 10px 14px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 18px;
            color: #fff;
            font-size: 13px;
            outline: none;
            transition: all 0.3s ease;
            min-width: 0;
        }
        .input-area input:focus { border-color: rgba(255,255,255,0.15); background: rgba(255,255,255,0.07); }
        .input-area input::placeholder { color: rgba(255,255,255,0.12); }
        .input-area input:disabled { opacity: 0.2; }
        .btn-send {
            padding: 10px 18px;
            background: rgba(96,165,250,0.12);
            border: 1px solid rgba(96,165,250,0.15);
            border-radius: 18px;
            color: #fff;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            transition: 0.25s;
            white-space: nowrap;
        }
        .btn-send:active { transform: scale(0.95); background: rgba(96,165,250,0.2); }
        .btn-send:disabled { opacity: 0.15; cursor: not-allowed; transform: none; }

        .device-id { color: rgba(255,255,255,0.04); font-size: 8px; text-align: center; margin-top: 4px; font-family: 'Courier New', monospace; flex-shrink: 0; }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20,20,20,0.9);
            backdrop-filter: blur(20px);
            padding: 10px 20px;
            border-radius: 14px;
            color: #fff;
            font-size: 13px;
            border: 1px solid rgba(255,255,255,0.05);
            z-index: 999;
            animation: fadeIn 0.3s;
            max-width: 90%;
            text-align: center;
        }
        .toast.error { border-color: rgba(248,113,113,0.2); color: #f87171; }
        .toast.success { border-color: rgba(74,222,128,0.2); color: #4ade80; }

        .offer-area {
            background: rgba(255,255,255,0.02);
            border-radius: 12px;
            padding: 8px 12px;
            margin: 4px 0;
            border: 1px solid rgba(255,255,255,0.04);
            flex-shrink: 0;
        }
        .offer-area textarea {
            width: 100%;
            height: 50px;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.04);
            border-radius: 10px;
            color: rgba(255,255,255,0.5);
            font-size: 10px;
            font-family: 'Courier New', monospace;
            padding: 6px 8px;
            outline: none;
            resize: none;
        }
        .offer-area textarea:focus { border-color: rgba(255,255,255,0.1); }
        .offer-area .label { color: rgba(255,255,255,0.2); font-size: 9px; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="glass">
    <!-- Header -->
    <div class="header">
        <h1>e<span>Chat</span></h1>
        <div class="status">
            <span class="dot gray" id="statusDot"></span>
            <span id="statusLabel">offline</span>
        </div>
    </div>

    <!-- Информация -->
    <div class="info-box">
        <div class="label">👤 Мой ID</div>
        <div class="value" id="myIdDisplay">---</div>
    </div>

    <div class="info-box" id="partnerBox">
        <div class="label">👥 Собеседник</div>
        <div class="value" id="partnerDisplay">не подключён</div>
    </div>

    <!-- Offer / Answer -->
    <div class="offer-area">
        <div class="label" id="offerLabel">📋 Скопируйте и отправьте это собеседнику (Telegram/WhatsApp)</div>
        <textarea id="offerText" readonly placeholder="Нажмите 'Создать приглашение'"></textarea>
        <div class="btn-row">
            <button class="btn primary" id="createOfferBtn">📤 Создать приглашение</button>
            <button class="btn success" id="connectBtn">🔗 Подключиться по приглашению</button>
        </div>
    </div>

    <!-- Сообщения -->
    <div class="messages" id="messagesContainer">
        <div class="empty" id="emptyMessages">💬 Нет сообщений<br><span style="font-size:10px;color:rgba(255,255,255,0.04);">Создайте или подключитесь по приглашению</span></div>
    </div>

    <!-- Ввод -->
    <div class="input-area">
        <input type="text" id="messageInput" placeholder="Введите сообщение..." disabled>
        <button class="btn-send" id="sendBtn" disabled>📤</button>
    </div>

    <div class="device-id" id="deviceId">eChat P2P v1.0</div>
</div>

<script>
(function() {
    'use strict';

    // =====================================================
    //  eChat — Прямое P2P соединение через WebRTC
    //  БЕЗ СЕРВЕРА! Только два телефона в одной сети.
    // =====================================================

    // ---- DOM ----
    const statusDot = document.getElementById('statusDot');
    const statusLabel = document.getElementById('statusLabel');
    const myIdDisplay = document.getElementById('myIdDisplay');
    const partnerDisplay = document.getElementById('partnerDisplay');
    const partnerBox = document.getElementById('partnerBox');
    const offerText = document.getElementById('offerText');
    const offerLabel = document.getElementById('offerLabel');
    const createOfferBtn = document.getElementById('createOfferBtn');
    const connectBtn = document.getElementById('connectBtn');
    const messagesContainer = document.getElementById('messagesContainer');
    const emptyMessages = document.getElementById('emptyMessages');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const deviceIdEl = document.getElementById('deviceId');

    // ---- Состояние ----
    let deviceId = localStorage.getItem('echat_p2p_id');
    if (!deviceId) {
        deviceId = 'u' + Math.random().toString(36).substring(2, 7);
        localStorage.setItem('echat_p2p_id', deviceId);
    }
    myIdDisplay.textContent = deviceId;
    deviceIdEl.textContent = 'eChat P2P v1.0 • ' + deviceId;

    let peerConnection = null;
    let dataChannel = null;
    let isConnected = false;
    let messages = JSON.parse(localStorage.getItem('echat_p2p_messages') || '[]');

    // ---- STUN серверы (бесплатные, для обхода NAT) ----
    const STUN_SERVERS = {
        iceServers: [
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:stun1.l.google.com:19302' },
            { urls: 'stun:stun2.l.google.com:19302' }
        ]
    };

    // ---- Функции ----

    function updateStatus(status, msg) {
        const dots = { online: 'green', waiting: 'yellow', offline: 'gray', error: 'red' };
        statusDot.className = 'dot ' + (dots[status] || 'gray');
        statusLabel.textContent = msg || status;
    }

    function showToast(text, type = '') {
        const old = document.querySelector('.toast');
        if (old) old.remove();
        const toast = document.createElement('div');
        toast.className = 'toast ' + type;
        toast.textContent = text;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    function renderMessages() {
        const container = messagesContainer;
        const items = container.querySelectorAll('.msg');
        items.forEach(el => el.remove());

        if (messages.length === 0) {
            emptyMessages.style.display = 'block';
            return;
        }
        emptyMessages.style.display = 'none';

        messages.forEach(msg => {
            const div = document.createElement('div');
            div.className = 'msg ' + (msg.sender === deviceId ? 'sent' : 'received');
            div.innerHTML = `
                ${msg.text}
                <div class="meta">
                    <span>${msg.sender === deviceId ? 'Вы' : msg.sender}</span>
                    <span>${msg.time}</span>
                </div>
            `;
            container.appendChild(div);
        });
        container.scrollTop = container.scrollHeight;
    }

    function saveMessages() {
        localStorage.setItem('echat_p2p_messages', JSON.stringify(messages));
        renderMessages();
    }

    function addMessage(text, sender) {
        const time = new Date().toLocaleTimeString();
        messages.push({ text, sender, time, timestamp: Date.now() });
        if (messages.length > 200) messages.shift();
        saveMessages();
        if (sender !== deviceId) {
            showToast('📩 ' + sender + ': ' + text, 'success');
        }
    }

    // ---- WebRTC ----

    function createPeerConnection() {
        const pc = new RTCPeerConnection(STUN_SERVERS);

        pc.oniceconnectionstatechange = () => {
            const state = pc.iceConnectionState;
            console.log('ICE state:', state);
            if (state === 'connected' || state === 'completed') {
                isConnected = true;
                updateStatus('online', 'соединение');
                messageInput.disabled = false;
                sendBtn.disabled = false;
                partnerDisplay.textContent = 'подключён ✅';
                partnerDisplay.style.color = '#4ade80';
                showToast('✅ Соединение установлено!', 'success');
                offerText.value = '';
                offerLabel.textContent = '✅ Соединение активно';
                createOfferBtn.disabled = true;
                connectBtn.disabled = true;
            } else if (state === 'failed' || state === 'disconnected') {
                isConnected = false;
                updateStatus('error', 'разрыв');
                messageInput.disabled = true;
                sendBtn.disabled = true;
                partnerDisplay.textContent = 'отключён';
                partnerDisplay.style.color = '';
                showToast('❌ Соединение разорвано', 'error');
                createOfferBtn.disabled = false;
                connectBtn.disabled = false;
            } else if (state === 'checking') {
                updateStatus('waiting', 'подключение...');
            }
        };

        // Канал для данных
        const channel = pc.createDataChannel('chat', {
            ordered: true,
            maxRetransmits: 3
        });

        channel.onopen = () => {
            isConnected = true;
            updateStatus('online', 'соединение');
            messageInput.disabled = false;
            sendBtn.disabled = false;
            partnerDisplay.textContent = 'подключён ✅';
            partnerDisplay.style.color = '#4ade80';
            showToast('✅ Соединение установлено!', 'success');
            createOfferBtn.disabled = true;
            connectBtn.disabled = true;
        };

        channel.onclose = () => {
            isConnected = false;
            updateStatus('error', 'разрыв');
            messageInput.disabled = true;
            sendBtn.disabled = true;
            partnerDisplay.textContent = 'отключён';
            partnerDisplay.style.color = '';
            createOfferBtn.disabled = false;
            connectBtn.disabled = false;
        };

        channel.onmessage = (event) => {
            try {
                const data = JSON.parse(event.data);
                if (data.type === 'message') {
                    addMessage(data.text, data.sender);
                }
            } catch (e) {
                console.error('Ошибка парсинга:', e);
            }
        };

        // Обработка входящего канала от другого пира
        pc.ondatachannel = (event) => {
            dataChannel = event.channel;
            dataChannel.onopen = () => {
                isConnected = true;
                updateStatus('online', 'соединение');
                messageInput.disabled = false;
                sendBtn.disabled = false;
                partnerDisplay.textContent = 'подключён ✅';
                partnerDisplay.style.color = '#4ade80';
                createOfferBtn.disabled = true;
                connectBtn.disabled = true;
            };
            dataChannel.onclose = () => {
                isConnected = false;
                updateStatus('error', 'разрыв');
                messageInput.disabled = true;
                sendBtn.disabled = true;
                partnerDisplay.textContent = 'отключён';
                partnerDisplay.style.color = '';
                createOfferBtn.disabled = false;
                connectBtn.disabled = false;
            };
            dataChannel.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    if (data.type === 'message') {
                        addMessage(data.text, data.sender);
                    }
                } catch (e) {
                    console.error('Ошибка парсинга:', e);
                }
            };
        };

        return pc;
    }

    // ---- Создать приглашение (Offer) ----
    async function createOffer() {
        if (peerConnection) {
            peerConnection.close();
            peerConnection = null;
            dataChannel = null;
        }

        peerConnection = createPeerConnection();
        dataChannel = peerConnection.createDataChannel('chat');

        try {
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);

            const sdp = JSON.stringify(peerConnection.localDescription);
            offerText.value = sdp;
            offerLabel.textContent = '📋 Скопируйте это и отправьте собеседнику!';

            updateStatus('waiting', 'ожидание подключения');
            showToast('📤 Приглашение создано! Отправьте его собеседнику', 'success');

            // Автоматически копируем в буфер
            try {
                await navigator.clipboard.writeText(sdp);
                showToast('📋 Скопировано в буфер обмена!', 'success');
            } catch (e) {
                // Если не удалось скопировать, пользователь скопирует вручную
            }

        } catch (e) {
            console.error('Ошибка создания Offer:', e);
            showToast('❌ Ошибка: ' + e.message, 'error');
        }
    }

    // ---- Подключиться по приглашению (Answer) ----
    async function connectToOffer() {
        const sdpText = offerText.value.trim();
        if (!sdpText) {
            showToast('❌ Вставьте приглашение в поле выше', 'error');
            return;
        }

        if (peerConnection) {
            peerConnection.close();
            peerConnection = null;
            dataChannel = null;
        }

        try {
            const offer = JSON.parse(sdpText);
            peerConnection = createPeerConnection();
            await peerConnection.setRemoteDescription(offer);

            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);

            const sdp = JSON.stringify(peerConnection.localDescription);
            offerText.value = sdp;
            offerLabel.textContent = '📋 Скопируйте это и отправьте собеседнику (Ответ)!';

            updateStatus('waiting', 'подключение...');
            showToast('📤 Ответ создан! Отправьте его собеседнику', 'success');

            // Автоматически копируем
            try {
                await navigator.clipboard.writeText(sdp);
                showToast('📋 Скопировано в буфер обмена!', 'success');
            } catch (e) {}

        } catch (e) {
            console.error('Ошибка подключения:', e);
            showToast('❌ Ошибка: ' + e.message, 'error');
        }
    }

    // ---- Отправка сообщения ----
    function sendMessage() {
        const text = messageInput.value.trim();
        if (!text || !isConnected || !dataChannel) {
            if (!isConnected) showToast('❌ Нет соединения', 'error');
            return;
        }

        try {
            dataChannel.send(JSON.stringify({
                type: 'message',
                text: text,
                sender: deviceId
            }));
            addMessage(text, deviceId);
            messageInput.value = '';
            messageInput.focus();
        } catch (e) {
            console.error('Ошибка отправки:', e);
            showToast('❌ Ошибка: ' + e.message, 'error');
        }
    }

    // ---- Сброс соединения ----
    function resetConnection() {
        if (peerConnection) {
            peerConnection.close();
            peerConnection = null;
            dataChannel = null;
        }
        isConnected = false;
        updateStatus('offline', 'offline');
        messageInput.disabled = true;
        sendBtn.disabled = true;
        partnerDisplay.textContent = 'не подключён';
        partnerDisplay.style.color = '';
        offerText.value = '';
        offerLabel.textContent = '📋 Скопируйте и отправьте это собеседнику';
        createOfferBtn.disabled = false;
        connectBtn.disabled = false;
        showToast('🔄 Соединение сброшено', '');
    }

    // ---- Обработчики ----
    createOfferBtn.addEventListener('click', createOffer);

    connectBtn.addEventListener('click', connectToOffer);

    sendBtn.addEventListener('click', sendMessage);

    messageInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            sendMessage();
        }
    });

    // Двойной тап по заголовку для сброса
    document.querySelector('.header h1').addEventListener('dblclick', resetConnection);

    // ---- Восстановление сообщений ----
    renderMessages();
    updateStatus('offline', 'offline');

    console.log('📱 eChat P2P готов. ID:', deviceId);
    console.log('📌 Инструкция:');
    console.log('  1. Один телефон нажимает "Создать приглашение"');
    console.log('  2. Отправляет код собеседнику (Telegram/WhatsApp)');
    console.log('  3. Собеседник вставляет код и нажимает "Подключиться"');
    console.log('  4. Готово! Общайтесь!');

})();
</script>
</body>
</html>
