<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>eChat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 8px;
        }
        .glass-card {
            background: rgba(20, 20, 20, 0.7);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 32px;
            padding: 16px 14px;
            max-width: 480px;
            width: 100%;
            max-height: 98vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.9);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            padding-bottom: 6px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }
        .header h1 {
            color: #ffffff;
            font-size: 20px;
            font-weight: 800;
            letter-spacing: 0.5px;
        }
        .header h1 span {
            color: #60a5fa;
        }
        .header-status {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.3);
        }
        .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            display: inline-block;
            flex-shrink: 0;
        }
        .dot.green { background: #4ade80; }
        .dot.yellow { background: #fbbf24; animation: pulse 1.5s ease-in-out infinite; }
        .dot.red { background: #f87171; }
        .dot.gray { background: rgba(255,255,255,0.12); }

        .status-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 4px 8px;
            padding: 6px 10px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            margin: 6px 0 8px 0;
            flex-shrink: 0;
            align-items: center;
        }
        .status-item {
            display: flex;
            align-items: center;
            gap: 4px;
            color: rgba(255, 255, 255, 0.35);
            font-size: 10px;
        }
        .status-item .label { opacity: 0.5; }
        .status-item .value {
            color: #60a5fa;
            font-family: 'Courier New', monospace;
            font-weight: 600;
            font-size: 11px;
        }
        .status-item .value.paired { color: #4ade80; }

        .code-section {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 14px;
            padding: 8px 12px;
            margin-bottom: 6px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 4px;
        }
        .code-section .label {
            color: rgba(255, 255, 255, 0.25);
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .code-section .code {
            font-size: 26px;
            font-weight: 900;
            letter-spacing: 6px;
            color: #ffffff;
            font-family: 'Courier New', monospace;
        }
        .code-section .code.paired {
            color: #4ade80;
            font-size: 14px;
            letter-spacing: 1px;
        }
        .code-actions {
            display: flex;
            gap: 4px;
        }

        .partner-section {
            display: flex;
            gap: 4px;
            align-items: center;
            padding: 4px 0;
            flex-shrink: 0;
            flex-wrap: wrap;
        }
        .partner-section .label {
            color: rgba(255, 255, 255, 0.25);
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .partner-section input {
            flex: 1;
            padding: 4px 10px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 12px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 11px;
            font-family: 'Courier New', monospace;
            outline: none;
            min-width: 80px;
        }
        .partner-section input:focus {
            border-color: rgba(255, 255, 255, 0.12);
            background: rgba(255, 255, 255, 0.05);
        }
        .partner-section input::placeholder {
            color: rgba(255, 255, 255, 0.12);
        }

        .btn-small {
            padding: 4px 12px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 600;
            white-space: nowrap;
        }
        .btn-small:active { transform: scale(0.95); background: rgba(255,255,255,0.08); }
        .btn-small.primary { color: #60a5fa; border-color: rgba(96, 165, 250, 0.15); }
        .btn-small.danger { color: #f87171; border-color: rgba(248, 113, 113, 0.15); }
        .btn-small.success { color: #4ade80; border-color: rgba(74, 222, 128, 0.15); }
        .btn-small:disabled { opacity: 0.3; cursor: not-allowed; }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 6px 2px;
            margin: 4px 0 6px 0;
            min-height: 180px;
            max-height: 400px;
            background: rgba(255, 255, 255, 0.01);
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.02);
            display: flex;
            flex-direction: column;
        }
        .messages-container::-webkit-scrollbar { width: 3px; }
        .messages-container::-webkit-scrollbar-track { background: rgba(255,255,255,0.01); }
        .messages-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 10px; }

        .message {
            padding: 8px 14px;
            margin: 2px 8px;
            border-radius: 14px;
            max-width: 85%;
            word-wrap: break-word;
            font-size: 13px;
            line-height: 1.3;
            animation: fadeIn 0.25s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message.received {
            background: rgba(255, 255, 255, 0.05);
            color: #ffffff;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        .message.sent {
            background: rgba(96, 165, 250, 0.12);
            color: #ffffff;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .message .meta {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin-top: 3px;
        }
        .message .meta .sender {
            font-size: 8px;
            color: rgba(255,255,255,0.15);
        }
        .message .meta .time {
            font-size: 8px;
            color: rgba(255,255,255,0.2);
        }
        .empty-messages {
            color: rgba(255, 255, 255, 0.08);
            text-align: center;
            padding: 30px 20px;
            font-size: 12px;
            align-self: center;
            margin: auto;
        }

        .input-area {
            display: flex;
            gap: 6px;
            padding: 6px 0 2px 0;
            flex-shrink: 0;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
        }
        .input-area input {
            flex: 1;
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 18px;
            color: #ffffff;
            font-size: 13px;
            outline: none;
            transition: all 0.3s ease;
            min-width: 0;
        }
        .input-area input:focus {
            border-color: rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.07);
        }
        .input-area input::placeholder {
            color: rgba(255, 255, 255, 0.12);
        }
        .input-area input:disabled {
            opacity: 0.2;
        }
        .btn-send {
            padding: 10px 18px;
            background: rgba(96, 165, 250, 0.12);
            border: 1px solid rgba(96, 165, 250, 0.15);
            border-radius: 18px;
            color: #ffffff;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.25s ease;
            white-space: nowrap;
        }
        .btn-send:active { transform: scale(0.95); background: rgba(96, 165, 250, 0.2); }
        .btn-send:disabled { opacity: 0.15; cursor: not-allowed; transform: none; }

        .device-id {
            color: rgba(255, 255, 255, 0.04);
            font-size: 8px;
            text-align: center;
            margin-top: 4px;
            font-family: 'Courier New', monospace;
            flex-shrink: 0;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20, 20, 20, 0.9);
            backdrop-filter: blur(20px);
            padding: 10px 20px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: #ffffff;
            font-size: 13px;
            font-weight: 500;
            z-index: 999;
            animation: fadeIn 0.3s ease;
            max-width: 90%;
            text-align: center;
        }
        .toast.error { border-color: rgba(248, 113, 113, 0.2); color: #f87171; }
        .toast.success { border-color: rgba(74, 222, 128, 0.2); color: #4ade80; }
    </style>
</head>
<body>

<div class="glass-card">
    <!-- Header -->
    <div class="header">
        <h1>e<span>Chat</span></h1>
        <div class="header-status">
            <span class="dot gray" id="statusDot"></span>
            <span id="statusLabel">offline</span>
        </div>
    </div>

    <!-- Status Bar -->
    <div class="status-bar">
        <div class="status-item">
            <span class="label">📡</span>
            <span class="value" id="ipDisplay">---</span>
        </div>
        <div class="status-item">
            <span class="label">👤</span>
            <span class="value" id="myIdDisplay">---</span>
        </div>
        <div class="status-item">
            <span class="label">👥</span>
            <span class="value" id="partnerDisplay">не выбран</span>
        </div>
    </div>

    <!-- Code Section -->
    <div class="code-section" id="codeSection">
        <span class="label">🔑 Код</span>
        <span class="code" id="codeDisplay">------</span>
        <div class="code-actions">
            <button class="btn-small primary" id="genCodeBtn">Новый</button>
            <button class="btn-small danger" id="resetBtn">Сброс</button>
        </div>
    </div>

    <!-- Partner IP -->
    <div class="partner-section">
        <span class="label">📱 IP собеседника</span>
        <input type="text" id="partnerIpInput" placeholder="192.168.1.xxx">
        <button class="btn-small success" id="connectBtn">Подключить</button>
        <button class="btn-small" id="copyIpBtn">📋</button>
    </div>

    <!-- Messages -->
    <div class="messages-container" id="messagesContainer">
        <div class="empty-messages" id="emptyMessages">
            💬 Нет сообщений<br>
            <span style="font-size:10px;color:rgba(255,255,255,0.05);">
                Сопрягитесь для начала общения
            </span>
        </div>
    </div>

    <!-- Input Area -->
    <div class="input-area">
        <input type="text" id="messageInput" placeholder="Введите сообщение..." disabled>
        <button class="btn-send" id="sendBtn" disabled>📤</button>
    </div>

    <div class="device-id" id="deviceId">eChat v1.0</div>
</div>

<script>
(function() {
    'use strict';

    // ===== Конфигурация =====
    const PORT = 8080;
    const STORAGE_KEY = 'echat_token';
    const DEVICE_ID_KEY = 'echat_device_id';
    const MESSAGES_KEY = 'echat_messages';
    const PARTNER_KEY = 'echat_partner_ip';

    // ===== DOM =====
    const statusDot = document.getElementById('statusDot');
    const statusLabel = document.getElementById('statusLabel');
    const ipDisplay = document.getElementById('ipDisplay');
    const myIdDisplay = document.getElementById('myIdDisplay');
    const partnerDisplay = document.getElementById('partnerDisplay');
    const codeDisplay = document.getElementById('codeDisplay');
    const codeSection = document.getElementById('codeSection');
    const genCodeBtn = document.getElementById('genCodeBtn');
    const resetBtn = document.getElementById('resetBtn');
    const partnerIpInput = document.getElementById('partnerIpInput');
    const connectBtn = document.getElementById('connectBtn');
    const copyIpBtn = document.getElementById('copyIpBtn');
    const messagesContainer = document.getElementById('messagesContainer');
    const emptyMessages = document.getElementById('emptyMessages');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const deviceIdEl = document.getElementById('deviceId');

    // ===== Состояние =====
    let deviceId = localStorage.getItem(DEVICE_ID_KEY);
    if (!deviceId) {
        deviceId = 'u' + Math.random().toString(36).substring(2, 7);
        localStorage.setItem(DEVICE_ID_KEY, deviceId);
    }
    myIdDisplay.textContent = deviceId;
    deviceIdEl.textContent = 'eChat v1.0 • ' + deviceId;

    let pairingCode = null;
    let token = localStorage.getItem(STORAGE_KEY);
    let isPaired = !!token;
    let partnerIp = localStorage.getItem(PARTNER_KEY) || '';
    let messages = JSON.parse(localStorage.getItem(MESSAGES_KEY) || '[]');
    let server = null;
    let myIp = '';

    // ===== Функции =====

    function addLog(msg) {
        console.log('[eChat]', msg);
    }

    function showToast(message, type = '') {
        const existing = document.querySelector('.toast');
        if (existing) existing.remove();
        const toast = document.createElement('div');
        toast.className = 'toast ' + type;
        toast.textContent = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    function getLocalIP() {
        return new Promise((resolve) => {
            const pc = new RTCPeerConnection({
                iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
            });
            pc.createDataChannel('test');
            pc.createOffer().then(offer => pc.setLocalDescription(offer)).catch(() => {});
            pc.onicecandidate = (event) => {
                if (event.candidate) {
                    const ip = event.candidate.candidate.split(' ')[4];
                    if (ip && (ip.startsWith('192.168.') || ip.startsWith('10.') || ip.startsWith('172.'))) {
                        pc.close();
                        resolve(ip);
                    }
                }
            };
            setTimeout(() => {
                pc.close();
                resolve('---');
            }, 3000);
        });
    }

    function updateStatus(status, message) {
        const dots = { online: 'green', waiting: 'yellow', offline: 'gray', error: 'red' };
        statusDot.className = 'dot ' + (dots[status] || 'gray');
        statusLabel.textContent = message || status;
    }

    function renderMessages() {
        const container = messagesContainer;
        // Удаляем все сообщения, кроме пустого
        const items = container.querySelectorAll('.message');
        items.forEach(el => el.remove());

        if (messages.length === 0) {
            emptyMessages.style.display = 'block';
            return;
        }
        emptyMessages.style.display = 'none';

        messages.forEach(msg => {
            const div = document.createElement('div');
            div.className = 'message ' + (msg.sender === deviceId ? 'sent' : 'received');
            div.innerHTML = `
                <div class="meta">
                    <span class="sender">${msg.sender === deviceId ? 'Вы' : msg.sender}</span>
                    <span class="time">${msg.time}</span>
                </div>
                ${msg.text}
            `;
            container.appendChild(div);
        });
        container.scrollTop = container.scrollHeight;
    }

    function saveMessages() {
        localStorage.setItem(MESSAGES_KEY, JSON.stringify(messages));
        renderMessages();
    }

    function addMessage(text, sender) {
        const time = new Date().toLocaleTimeString();
        messages.push({
            text: text,
            sender: sender || deviceId,
            time: time,
            timestamp: Date.now()
        });
        saveMessages();
    }

    function generateCode() {
        if (isPaired) {
            showToast('Сопряжение уже активно!', 'error');
            return;
        }
        pairingCode = Math.random().toString(36).substring(2, 8).toUpperCase();
        codeDisplay.textContent = pairingCode;
        codeDisplay.className = 'code';
        showToast('Новый код: ' + pairingCode, 'success');
        updateStatus('waiting', 'Ожидание сопряжения');
        addLog('Сгенерирован код: ' + pairingCode);
    }

    // ===== HTTP Сервер =====
    function startServer() {
        if (server) {
            server.close();
        }

        try {
            const channel = new BroadcastChannel('echat_server_' + deviceId);
            server = channel;

            channel.onmessage = (event) => {
                const data = event.data;
                if (data.type === 'request') {
                    handleRequest(data, channel);
                }
            };

            // Регистрируем Service Worker для обработки HTTP запросов
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('/echat-sw.js', { scope: '/' })
                    .then(reg => {
                        addLog('Service Worker зарегистрирован');
                        navigator.serviceWorker.ready.then(() => {
                            reg.active.postMessage({
                                type: 'init',
                                port: PORT,
                                deviceId: deviceId,
                                token: token,
                                isPaired: isPaired,
                                pairingCode: pairingCode
                            });
                        });
                    })
                    .catch(err => {
                        addLog('SW ошибка: ' + err.message);
                        // Запускаем fallback сервер через fetch
                        startFallbackServer();
                    });
            } else {
                startFallbackServer();
            }

            updateStatus('waiting', 'Сервер запущен');
            addLog('Сервер запущен на порту ' + PORT);

        } catch (e) {
            addLog('Ошибка сервера: ' + e.message);
            updateStatus('error', 'Ошибка сервера');
        }
    }

    function startFallbackServer() {
        // Простой сервер через fetch polling
        addLog('Fallback режим: опрос входящих');
        // В реальности здесь нужен более сложный механизм
        // Но для простоты используем BroadcastChannel
        const channel = new BroadcastChannel('echat_fallback_' + deviceId);
        server = channel;

        channel.onmessage = (event) => {
            const data = event.data;
            if (data.type === 'message') {
                addMessage(data.text, data.sender);
                showToast('📩 ' + data.sender + ': ' + data.text, 'success');
            }
        };

        // Периодический опрос
        setInterval(() => {
            // Проверяем наличие новых сообщений через localStorage
            const stored = JSON.parse(localStorage.getItem('echat_inbox_' + deviceId) || '[]');
            if (stored.length > 0) {
                stored.forEach(msg => {
                    addMessage(msg.text, msg.sender);
                });
                localStorage.setItem('echat_inbox_' + deviceId, '[]');
            }
        }, 2000);
    }

    // ===== Обработка запросов =====
    function handleRequest(data, channel) {
        const { url, method, body, requestId } = data;

        // GET /get_code
        if (url === '/get_code' && method === 'GET') {
            if (isPaired) {
                channel.postMessage({
                    type: 'response',
                    requestId: requestId,
                    status: 400,
                    body: JSON.stringify({ error: 'Already paired' })
                });
                return;
            }
            if (!pairingCode) generateCode();
            channel.postMessage({
                type: 'response',
                requestId: requestId,
                status: 200,
                body: pairingCode
            });
            return;
        }

        // POST /pair
        if (url === '/pair' && method === 'POST') {
            try {
                const data = JSON.parse(body);
                const code = data.code.toUpperCase();
                const sender = data.device_id;

                if (isPaired) {
                    channel.postMessage({
                        type: 'response',
                        requestId: requestId,
                        status: 400,
                        body: JSON.stringify({ status: 'error', message: 'Already paired' })
                    });
                    return;
                }

                if (code === pairingCode) {
                    token = Math.random().toString(36).substring(2, 18);
                    isPaired = true;
                    localStorage.setItem(STORAGE_KEY, token);
                    codeDisplay.textContent = '🔒 Сопряжено';
                    codeDisplay.className = 'code paired';
                    partnerDisplay.textContent = sender;
                    partnerDisplay.style.color = '#4ade80';
                    updateStatus('online', 'Сопряжено с ' + sender);
                    showToast('✅ Сопряжено с ' + sender, 'success');
                    messageInput.disabled = false;
                    sendBtn.disabled = false;

                    channel.postMessage({
                        type: 'response',
                        requestId: requestId,
                        status: 200,
                        body: JSON.stringify({ status: 'ok', token: token })
                    });
                } else {
                    channel.postMessage({
                        type: 'response',
                        requestId: requestId,
                        status: 400,
                        body: JSON.stringify({ status: 'error', message: 'Invalid code' })
                    });
                }
            } catch (e) {
                channel.postMessage({
                    type: 'response',
                    requestId: requestId,
                    status: 500,
                    body: JSON.stringify({ error: e.message })
                });
            }
            return;
        }

        // POST /message (отправка сообщения)
        if (url === '/message' && method === 'POST') {
            if (!isPaired) {
                channel.postMessage({
                    type: 'response',
                    requestId: requestId,
                    status: 401,
                    body: JSON.stringify({ error: 'Not paired' })
                });
                return;
            }
            try {
                const data = JSON.parse(body);
                const text = data.text;
                const sender = data.sender;

                if (text) {
                    addMessage(text, sender);
                    showToast('📩 ' + sender + ': ' + text, 'success');
                    channel.postMessage({
                        type: 'response',
                        requestId: requestId,
                        status: 200,
                        body: JSON.stringify({ status: 'ok' })
                    });
                }
            } catch (e) {
                channel.postMessage({
                    type: 'response',
                    requestId: requestId,
                    status: 500,
                    body: JSON.stringify({ error: e.message })
                });
            }
            return;
        }

        // GET /messages (получение истории)
        if (url === '/messages' && method === 'GET') {
            channel.postMessage({
                type: 'response',
                requestId: requestId,
                status: 200,
                body: JSON.stringify({ messages: messages })
            });
            return;
        }

        // Неизвестный запрос
        channel.postMessage({
            type: 'response',
            requestId: requestId,
            status: 404,
            body: 'Not found'
        });
    }

    // ===== Отправка сообщения =====
    async function sendMessage(text) {
        if (!text || !text.trim()) return;
        if (!isPaired) {
            showToast('Сначала сопрягитесь!', 'error');
            return;
        }
        if (!partnerIp) {
            showToast('Введите IP собеседника!', 'error');
            return;
        }

        const msg = text.trim();
        messageInput.value = '';
        messageInput.disabled = true;
        sendBtn.disabled = true;

        try {
            const url = `http://${partnerIp}:${PORT}/message`;
            const response = await fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + token
                },
                body: JSON.stringify({
                    text: msg,
                    sender: deviceId
                })
            });

            if (response.ok) {
                addMessage(msg, deviceId);
                showToast('✅ Отправлено', 'success');
            } else {
                const error = await response.json().catch(() => ({}));
                showToast('❌ ' + (error.message || 'Ошибка отправки'), 'error');
                // Возвращаем сообщение обратно в поле
                messageInput.value = msg;
            }
        } catch (e) {
            showToast('❌ Не удалось отправить: ' + e.message, 'error');
            messageInput.value = msg;
        }

        messageInput.disabled = false;
        sendBtn.disabled = false;
        messageInput.focus();
    }

    // ===== Получение кода с сервера =====
    async function fetchCode(ip) {
        try {
            const url = `http://${ip}:${PORT}/get_code`;
            const response = await fetch(url);
            if (response.ok) {
                return await response.text();
            }
            return null;
        } catch (e) {
            return null;
        }
    }

    // ===== Сопряжение =====
    async function pairWithDevice(ip, code) {
        try {
            const url = `http://${ip}:${PORT}/pair`;
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    code: code,
                    device_id: deviceId
                })
            });
            const data = await response.json();
            if (response.ok && data.status === 'ok') {
                token = data.token;
                isPaired = true;
                localStorage.setItem(STORAGE_KEY, token);
                localStorage.setItem(PARTNER_KEY, ip);
                partnerIp = ip;
                partnerDisplay.textContent = ip;
                partnerDisplay.style.color = '#4ade80';
                codeDisplay.textContent = '🔒 Сопряжено';
                codeDisplay.className = 'code paired';
                updateStatus('online', 'Сопряжено');
                messageInput.disabled = false;
                sendBtn.disabled = false;
                showToast('✅ Сопряжение успешно!', 'success');
                return true;
            } else {
                showToast('❌ ' + (data.message || 'Ошибка сопряжения'), 'error');
                return false;
            }
        } catch (e) {
            showToast('❌ Ошибка: ' + e.message, 'error');
            return false;
        }
    }

    // ===== Подключение к собеседнику =====
    async function connectToPartner() {
        const ip = partnerIpInput.value.trim();
        if (!ip) {
            showToast('Введите IP собеседника', 'error');
            return;
        }

        partnerIp = ip;
        localStorage.setItem(PARTNER_KEY, ip);
        partnerDisplay.textContent = ip;

        showToast('🔍 Поиск собеседника...', '');
        updateStatus('waiting', 'Подключение...');

        // Пробуем получить код с сервера
        const code = await fetchCode(ip);
        if (code) {
            codeDisplay.textContent = code;
            showToast('🔑 Код получен: ' + code, 'success');
            // Автоматически сопрягаемся
            await pairWithDevice(ip, code);
        } else {
            showToast('❌ Не удалось подключиться к ' + ip, 'error');
            updateStatus('offline', 'Офлайн');
        }
    }

    // ===== Сброс =====
    function resetAll() {
        if (!confirm('Сбросить всё сопряжение и историю?')) return;

        localStorage.removeItem(STORAGE_KEY);
        localStorage.removeItem(PARTNER_KEY);
        localStorage.removeItem(MESSAGES_KEY);

        token = null;
        isPaired = false;
        partnerIp = '';
        messages = [];
        pairingCode = null;

        codeDisplay.textContent = '------';
        codeDisplay.className = 'code';
        partnerDisplay.textContent = 'не выбран';
        partnerDisplay.style.color = '';
        partnerIpInput.value = '';
        messageInput.disabled = true;
        sendBtn.disabled = true;
        updateStatus('offline', 'Офлайн');

        renderMessages();
        showToast('🔄 Сброшено', '');
    }

    // ===== Инициализация =====
    async function init() {
        // Получаем IP
        myIp = await getLocalIP();
        ipDisplay.textContent = myIp;

        // Восстанавливаем состояние
        partnerIp = localStorage.getItem(PARTNER_KEY) || '';
        if (partnerIp) {
            partnerIpInput.value = partnerIp;
            partnerDisplay.textContent = partnerIp;
        }

        if (isPaired) {
            codeDisplay.textContent = '🔒 Сопряжено';
            codeDisplay.className = 'code paired';
            messageInput.disabled = false;
            sendBtn.disabled = false;
            updateStatus('online', 'Сопряжено');
        }

        // Восстанавливаем сообщения
        renderMessages();

        // Запускаем сервер
        startServer();

        // Генерируем код если не сопряжены
        if (!isPaired) {
            generateCode();
        }

        // Обработчики
        genCodeBtn.addEventListener('click', generateCode);

        resetBtn.addEventListener('click', resetAll);

        connectBtn.addEventListener('click', connectToPartner);

        copyIpBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(myIp).then(() => {
                showToast('📋 IP скопирован', 'success');
            }).catch(() => {
                // Fallback
                const input = document.createElement('input');
                input.value = myIp;
                document.body.appendChild(input);
                input.select();
                document.execCommand('copy');
                input.remove();
                showToast('📋 IP скопирован', 'success');
            });
        });

        sendBtn.addEventListener('click', () => {
            sendMessage(messageInput.value);
        });

        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                sendMessage(messageInput.value);
            }
        });

        // Автоподключение если есть сохранённый IP
        if (partnerIp && !isPaired) {
            setTimeout(() => {
                connectToPartner();
            }, 2000);
        }

        addLog('eChat инициализирован. IP: ' + myIp + ', ID: ' + deviceId);
    }

    // ===== Service Worker регистрация =====
    // Создаём Service Worker динамически
    function registerServiceWorker() {
        const swCode = `
            self.addEventListener('install', event => {
                self.skipWaiting();
            });
            self.addEventListener('activate', event => {
                clients.claim();
            });
            self.addEventListener('message', event => {
                const data = event.data;
                if (data.type === 'init') {
                    self.config = data;
                }
            });
            self.addEventListener('fetch', event => {
                const url = new URL(event.request.url);
                const channel = new BroadcastChannel('echat_server_' + (self.config ? self.config.deviceId : 'default'));
                
                // Перенаправляем запрос в основной поток
                event.respondWith(new Promise((resolve) => {
                    const requestId = 'req_' + Date.now() + '_' + Math.random().toString(36).substring(2, 5);
                    
                    channel.postMessage({
                        type: 'request',
                        url: url.pathname,
                        method: event.request.method,
                        body: null,
                        requestId: requestId
                    });
                    
                    channel.onmessage = (msg) => {
                        if (msg.data.type === 'response' && msg.data.requestId === requestId) {
                            resolve(new Response(msg.data.body, {
                                status: msg.data.status,
                                headers: { 'Content-Type': 'text/plain' }
                            }));
                        }
                    };
                    
                    setTimeout(() => {
                        resolve(new Response('Timeout', { status: 408 }));
                    }, 5000);
                }));
            });
        `;

        try {
            const blob = new Blob([swCode], { type: 'application/javascript' });
            const swUrl = URL.createObjectURL(blob);
            
            navigator.serviceWorker.register(swUrl, { scope: '/' })
                .then(reg => {
                    addLog('Service Worker зарегистрирован');
                })
                .catch(err => {
                    addLog('SW регистрация ошибка: ' + err.message);
                });
        } catch (e) {
            addLog('SW ошибка: ' + e.message);
        }
    }

    // Запуск
    if ('serviceWorker' in navigator) {
        registerServiceWorker();
    }
    init();

})();
</script>
